syntax = "proto3";

package auth;

option go_package = "example.com/tech-ip-grpc/proto/authpb;authpb";

// AuthService — gRPC-сервис авторизации
service AuthService {
  // Verify — проверка токена
  rpc Verify (VerifyRequest) returns (VerifyResponse);
}

// Запрос на проверку токена
message VerifyRequest {
  string token = 1;
}

// Ответ проверки токена
message VerifyResponse {
  bool valid = 1;
  string subject = 2;
}